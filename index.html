/* ---------- 3D muscle atlas ----------
   Renders public/assets/models/muscles.glb: 14 pickable muscle meshes whose
   names match MUSCLE_ATLAS ids exactly, plus a `context` mesh holding every
   other muscle so the figure has no holes. The mesh is Draco-compressed, so
   a DRACOLoader must be registered or nothing loads.

   Three.js arrives by dynamic import() from a CDN. That makes the atlas the
   one part of this app that needs the network on first use, so every failure
   path (no WebGL, CDN down, missing model) falls back to the 2D SVG figure
   rather than leaving a dead canvas. */
const GLB_URL='public/assets/models/muscles.glb';
const DRACO_URL='https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/gltf/';
const MUSCLE_COL=0xeef1f4, MUSCLE_HOT=0xe8452c, CONTEXT_COL=0xb9c2cc;
let fit3d=null, fit3dView='explore', fit3dSel=null;

const hasWebGL=()=>{try{const c=document.createElement('canvas');
 return !!(window.WebGLRenderingContext&&(c.getContext('webgl2')||c.getContext('webgl')))}catch(e){return false}};

/* Days since any client last trained this muscle; null when never trained. */
function daysSinceTrained(muscleId){
 const done=db.sessions.filter(s=>s.status==='done').sort((a,b)=>b.date.localeCompare(a.date));
 for(const s of done){
  const fromEx=(s.exercises||[]).some(e=>{const ex=e.exId&&exerciseOf(e.exId);return ex&&ex.primary.includes(muscleId)});
  const fromCoarse=(s.muscles||[]).some(m=>(COARSE_MUSCLE_MAP[m]||[]).includes(muscleId));
  if(fromEx||fromCoarse)return Math.max(0,Math.floor((Date.now()-D(s.date).getTime())/864e5));
 }
 return null;
}
/* 0 days = hot orange, 5+ days (or never) = neutral grey. */
function recoveryColor(THREE,days){
 if(days===null)return new THREE.Color(CONTEXT_COL);
 const t=Math.min(1,days/5);
 return new THREE.Color(0xff7a1a).lerp(new THREE.Color(0x9aa4b0),t);
}

function fit3dDispose(){
 if(!fit3d)return;
 cancelAnimationFrame(fit3d.raf);
 if(fit3d.onResize)window.removeEventListener('resize',fit3d.onResize);
 fit3d.controls?.dispose();
 fit3d.scene?.traverse(o=>{if(o.isMesh){o.geometry.dispose();o.material.dispose()}});
 fit3d.draco?.dispose();
 // dispose() alone leaves the GL context alive: navigate in and out of the
 // atlas enough times and the browser starts force-losing older contexts.
 // Detach the canvas first, otherwise three re-acquires the context it just lost.
 fit3d.renderer?.domElement?.remove();
 try{fit3d.renderer?.forceContextLoss()}catch(e){}
 fit3d.renderer?.dispose();
 fit3d=null;fit3dSel=null;
}

function fit3dFail(msg){
 const stage=document.getElementById('fit3d-stage');
 if(!stage)return;
 stage.innerHTML=`<div class="fit-3d-msg">${mgFigureSvg('front',[])}
   <p>${esc(msg)}<br>Showing the 2D figure instead.</p></div>`;
}

async function fit3dInit(){
 const stage=document.getElementById('fit3d-stage');
 if(!stage)return;
 if(!hasWebGL()){fit3dFail('3D is not supported on this device.');return}
 let THREE,GLTFLoader,DRACOLoader,OrbitControls;
 try{
  [THREE,{GLTFLoader},{DRACOLoader},{OrbitControls}]=await Promise.all([
   import('three'),
   import('three/addons/loaders/GLTFLoader.js'),
   import('three/addons/loaders/DRACOLoader.js'),
   import('three/addons/controls/OrbitControls.js')]);
 }catch(e){fit3dFail('Could not load the 3D engine.');return}
 if(!document.getElementById('fit3d-stage'))return;   // user navigated away mid-load

 const w=stage.clientWidth,h=stage.clientHeight;
 const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
 renderer.setPixelRatio(Math.min(devicePixelRatio,2));
 renderer.setSize(w,h);
 const scene=new THREE.Scene();
 const camera=new THREE.PerspectiveCamera(34,w/h,0.1,50);
 camera.position.set(0,1.0,3.6);

 scene.add(new THREE.HemisphereLight(0xffffff,0x2a2016,1.5));
 const key=new THREE.DirectionalLight(0xffffff,2.1);key.position.set(-2,3,4);scene.add(key);
 const rim=new THREE.DirectionalLight(0xffb27a,1.1);rim.position.set(3,1,-4);scene.add(rim);

 const controls=new OrbitControls(camera,renderer.domElement);
 controls.enablePan=false;controls.enableDamping=true;controls.dampingFactor=.08;
 controls.minDistance=1.6;controls.maxDistance=6;controls.target.set(0,0.95,0);
 controls.minPolarAngle=.6;controls.maxPolarAngle=Math.PI-.6;

 const draco=new DRACOLoader().setDecoderPath(DRACO_URL);
 const loader=new GLTFLoader().setDRACOLoader(draco);

 let gltf;
 try{gltf=await loader.loadAsync(GLB_URL)}
 catch(e){draco.dispose();fit3dFail('Could not load the anatomy model.');return}
 if(!document.getElementById('fit3d-stage')){draco.dispose();renderer.dispose();return}

 stage.innerHTML='';stage.appendChild(renderer.domElement);

 const pickable=[];
 gltf.scene.traverse(o=>{
  if(!o.isMesh)return;
  const isCtx=o.name==='context';
  o.material=new THREE.MeshStandardMaterial({
   color:isCtx?CONTEXT_COL:MUSCLE_COL,roughness:.85,metalness:0,
   transparent:isCtx,opacity:isCtx?.55:1});
  if(!isCtx)pickable.push(o);
 });
 scene.add(gltf.scene);

 fit3d={THREE,renderer,scene,camera,controls,draco,pickable,raf:0};
 fit3dApplyMode();

 const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
 let downAt=null;
 const pos=e=>{const r=renderer.domElement.getBoundingClientRect();
  const t=e.changedTouches?e.changedTouches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top,w:r.width,h:r.height}};
 const onDown=e=>{downAt=pos(e)};
 const onUp=e=>{
  if(!downAt)return;
  const p=pos(e);
  if(Math.hypot(p.x-downAt.x,p.y-downAt.y)>6){downAt=null;return}  // a drag, not a tap
  downAt=null;
  ndc.x=(p.x/p.w)*2-1;ndc.y=-(p.y/p.h)*2+1;
  ray.setFromCamera(ndc,camera);
  const hit=ray.intersectObjects(pickable,false)[0];
  fit3dSelect(hit?hit.object.name:null);
 };
 renderer.domElement.addEventListener('pointerdown',onDown);
 renderer.domElement.addEventListener('pointerup',onUp);

 const onResize=()=>{
  if(!fit3d)return;
  const s=document.getElementById('fit3d-stage');if(!s)return;
  camera.aspect=s.clientWidth/s.clientHeight;camera.updateProjectionMatrix();
  renderer.setSize(s.clientWidth,s.clientHeight);
 };
 window.addEventListener('resize',onResize);
 fit3d.onResize=onResize;

 (function loop(){
  if(!fit3d)return;
  fit3d.raf=requestAnimationFrame(loop);
  controls.update();renderer.render(scene,camera);
 })();
}

/* Recolour every pickable mesh for the current mode + selection. */
function fit3dApplyMode(){
 if(!fit3d)return;
 const {THREE}=fit3d;
 fit3d.pickable.forEach(m=>{
  if(fit3dView==='recovery'){m.material.color.copy(recoveryColor(THREE,daysSinceTrained(m.name)))}
  else{m.material.color.setHex(m.name===fit3dSel?MUSCLE_HOT:MUSCLE_COL)}
  m.material.emissive.setHex(m.name===fit3dSel&&fit3dView==='explore'?0x3a0f06:0x000000);
 });
}
function fit3dSelect(name){
 fit3dSel=(name===fit3dSel)?null:name;
 fit3dApplyMode();
 const sheet=document.getElementById('fit3d-sheet');
 if(sheet)sheet.innerHTML=fit3dSheet(fit3dSel);
}
function fit3dMode(mode){
 fit3dView=mode;
 document.querySelectorAll('#fit3d-tabs button').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
 const lg=document.getElementById('fit3d-legend');
 if(lg)lg.style.display=mode==='recovery'?'flex':'none';
 fit3dApplyMode();
 const sheet=document.getElementById('fit3d-sheet');
 if(sheet)sheet.innerHTML=fit3dSheet(fit3dSel);
}
function fit3dFace(dir){
 if(!fit3d)return;
 const {controls,camera}=fit3d,r=camera.position.distanceTo(controls.target);
 camera.position.set(0,controls.target.y+.05,dir==='back'?-r:r);
 controls.update();
}

/* Which fitness group screen a given atlas muscle belongs to, so the sheet can
   deep-link into the full exercise grid. `forearms` has no group of its own. */
const MUSCLE_TO_GROUP={chest:'chest',shoulders:'shoulders',biceps:'biceps',triceps:'triceps',
 lats:'back',traps:'back',lowerback:'back',abs:'abs',obliques:'abs',
 quads:'legs',hamstrings:'legs',glutes:'legs',calves:'legs'};

const FIT3D_TABS=[['overview','نظرة عامة'],['exercises','التمارين'],['anatomy','التشريح'],['tips','نصائح']];
let fit3dTab='overview';
function fit3dSetTab(t){
 fit3dTab=t;
 const sheet=document.getElementById('fit3d-sheet');
 if(sheet)sheet.innerHTML=fit3dSheet(fit3dSel);
}

const fit3dRecLine=(m,days)=>days===null
 ? 'لم تُدرَّب بعد'
 : `دُرِّبت <b>${days===0?'النهاردة':'من '+days+' يوم'}</b> · تحتاج ${m.recovery} ساعة تعافي`;

function fit3dSheet(id){
 if(!id)return `<p class="fit-note">دوس على أي عضلة في المجسم عشان تشوف تفاصيلها وتمارينها.</p>`;
 const m=muscleOf(id);
 if(!m)return '';
 const days=daysSinceTrained(id);
 const allEx=[...(m.compound||[]),...(m.isolation||[])].map(exerciseOf).filter(Boolean);
 const group=MUSCLE_TO_GROUP[id];

 let body='';
 if(fit3dTab==='exercises'){
  body=allEx.length
   ? `<div class="fit-exlist">${allEx.map(e=>`
      <div class="fit-exrow">
       <span class="fit-exrow-i">${fitIc('dumbbell')}</span>
       <div class="grow">
        <div class="n" dir="rtl">${esc(e.ar)}</div>
        <div class="d" dir="rtl">${setsRepsOf(e)} · ${esc(e.equip)} · ${esc(e.level)}</div>
       </div>
       <span class="fit-exrow-t ${e.type==='compound'?'c':'i'}">${e.type==='compound'?'مركّب':'عزل'}</span>
      </div>`).join('')}</div>
      ${group?`<button class="fit-3d-more" onclick="location.hash='#/fitness/m/${group}'">
        عرض كل التمارين بالصور ${fitIc('chevron-right')}</button>`:''}`
   : `<p class="fit-note">لا يوجد تمارين مسجّلة لهذه العضلة.</p>`;

 }else if(fit3dTab==='anatomy'){
  const ant=m.antagonist?(muscleOf(m.antagonist)||{}).ar||m.antagonist:'—';
  body=`<div class="fit-metrics">
    <div class="fit-metric"><b style="font-size:15px">${esc(ant)}</b><span>العضلة المضادة</span></div>
    <div class="fit-metric"><b>${m.recovery}<span style="font-size:13px">س</span></b><span>وقت التعافي</span></div>
   </div>
   <div class="fit-sub2">المفاصل المعنية</div>
   <div class="fit-chips">${(m.joints||[]).map(j=>`<span class="fit-pill">${esc(j)}</span>`).join('')||'<span class="fit-note">—</span>'}</div>
   <div class="fit-sub2">الإطالة الموصى بها</div>
   <p class="fn" dir="rtl">${esc(m.stretch)}</p>
   <div class="fit-sub2">${fitIc('alert-triangle')} إصابات شائعة</div>
   <ul class="fit-bullets" dir="rtl">${(m.injuries||[]).map(i=>`<li>${esc(i)}</li>`).join('')||'<li>—</li>'}</ul>`;

 }else if(fit3dTab==='tips'){
  body=(m.tips||[]).length
   ? `<ul class="fit-bullets" dir="rtl">${m.tips.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>`
   : `<p class="fit-note">لا يوجد نصائح.</p>`;

 }else{
  const byEquip={};
  allEx.forEach(e=>{(byEquip[e.equip]=byEquip[e.equip]||[]).push(e)});
  body=`<p class="fn" dir="rtl">${esc(m.fn)}</p>
   <div class="fit-metrics" style="margin-top:14px">
    <div class="fit-metric"><b>${allEx.length}</b><span>عدد التمارين</span></div>
    <div class="fit-metric"><b>${m.recovery}<span style="font-size:13px">س</span></b><span>وقت التعافي</span></div>
   </div>
   <div class="fit-sub2">${fitIc('settings')} التدريب حسب الجهاز</div>
   ${Object.entries(byEquip).map(([eq,exs])=>`
     <div class="fit-equip" dir="rtl">
      <div class="e">${esc(eq)}</div>
      <div class="fit-chips">${exs.map(e=>`<span class="fit-pill">${esc(e.ar)}</span>`).join('')}</div>
     </div>`).join('')||'<p class="fit-note">—</p>'}`;
 }

 return `<div class="fit-3d-head">
   <div class="grow" dir="rtl">
    <h3>${esc(m.ar)}</h3>
    <div class="ar">${esc(m.nameEn||'')}</div>
   </div>
   <button class="fit-3d-x" onclick="fit3dSelect(null)" aria-label="إغلاق">${fitIc('x')}</button>
  </div>
  <div class="rec">${fitIc('clock')}<span dir="rtl">${fit3dRecLine(m,days)}</span></div>
  <div class="fit-subtabs">${FIT3D_TABS.map(([k,l])=>
    `<button class="${fit3dTab===k?'on':''}" onclick="fit3dSetTab('${k}')">${l}</button>`).join('')}</div>
  <div class="fit-3d-body">${body}</div>`;
}

function renderAtlas3D(){
 return `<div class="fit-head">
   <button class="fit-back" onclick="location.hash='#/fitness'" aria-label="Back">${fitIc('arrow-left')}</button>
   <h1 class="fit-h1" style="margin-top:16px">Muscle Atlas</h1>
   <p class="fit-sub">Tap a muscle to explore</p>
  </div>
  <div class="fit-tabs" id="fit3d-tabs">
   <button data-m="explore" class="${fit3dView==='explore'?'on':''}" onclick="fit3dMode('explore')">Explore</button>
   <button data-m="recovery" class="${fit3dView==='recovery'?'on':''}" onclick="fit3dMode('recovery')">Recovery</button>
  </div>
  <div class="fit-3d-stage" id="fit3d-stage">
   <div class="fit-3d-msg"><span class="fit-spin"></span><p>Loading anatomy…</p></div>
  </div>
  <div class="fit-legend" id="fit3d-legend" style="display:${fit3dView==='recovery'?'flex':'none'}">
   <span><i style="background:#ff7a1a"></i>Trained today</span>

  </div>
  <div class="fit-3d-ctrl">

}

/* ---------- Screens ---------- */
function renderExercisesHome(){
 return `<div class="fit-head">
   <h1 class="fit-h1">Exercises</h1>
   <p class="fit-sub">Choose a muscle group</p>
  </div>
  <button class="fit-glass fit-summary" onclick="location.hash='#/fitness/stats'">
   <span class="fit-orb">${fitIc('flame')}</span>
   <span><span class="v">954<span>kcal</span></span><span class="l">Burned today</span></span>
   <span class="chev">${fitIc('chevron-right')}</span>
  </button>
  <div class="fit-mgrid" style="margin-top:20px">
   ${FITNESS_MUSCLE_GROUPS.map(g=>`
    <button class="fit-mcell" onclick="location.hash='#/fitness/m/${g.key}'">
     <span class="fit-mcard" style="--g:${g.color}">

function renderMuscleExercises(key){
 const g=groupOf(key);
 if(!g){location.hash='#/fitness';return ''}
 const list=exercisesForGroup(key);
 const body=list.length
  ? `<div class="fit-exgrid">${list.map(ex=>`
     <div class="fit-ex">
      <div class="fit-ex-media">
       ${exerciseImageOrFallback(ex,key)}
      </div>
      <div class="fit-ex-body">
       <div class="fit-ex-name" dir="auto">${esc(ex.name)}</div>
       <div class="fit-ex-foot">
        <span class="fit-pill">${fitIc('dumbbell')}${esc(ex.equip)}</span>
        <span class="fit-diff">${[1,2,3].map(i=>`<i class="${i<=ex.diff?'on':''}"></i>`).join('')}</span>
       </div>
      </div>
     </div>`).join('')}</div>`
  : `<div class="fit-empty">${fitIc('heart-pulse')}<p>Cardio sessions are tracked from the coach dashboard</p></div>`;
 return `<div class="fit-head">
   <button class="fit-back" onclick="location.hash='#/fitness'" aria-label="Back">${fitIc('arrow-left')}</button>
   <h1 class="fit-h1" style="margin-top:16px">${g.name}</h1>
   <p class="fit-sub">${list.length} exercise${list.length===1?'':'s'}</p>
  </div>
  ${body}`;
}

function renderPrograms(){
 const progs=db.programs||[];
 return `<div class="fit-head">
   <h1 class="fit-h1">Programs</h1>
   <p class="fit-sub">${progs.length?progs.length+' برنامج':'اعمل تقسيمة وارْبطها بمتدربينك'}</p>
  </div>
  <button class="fit-glass fit-summary" onclick="formProgram('')">
   <span class="fit-orb">${fitIc('plus')}</span>
   <span><span class="v" style="font-size:18px">برنامج جديد</span><span class="l">اختار الأيام والعضلات بنفسك</span></span>
   <span class="chev">${fitIc('chevron-right')}</span>
  </button>

  ${progs.length?`<h2 class="fit-sec-t">برامجك</h2>
   <div class="fit-proglist">${progs.map(p=>{
     const used=clientsOnProgram(p.id);
     return `<div class="fit-progcard">
      <div class="fit-progcard-h">
       <div class="grow">
        <div class="n">${esc(p.name)}</div>
        <div class="d">${p.days.length} أيام${p.tag?' · '+esc(p.tag):''} · ${used.length} متدرب</div>
       </div>
       <button class="fit-3d-x" onclick="formProgram('${p.id}')" aria-label="تعديل">${fitIc('edit')}</button>
       <button class="fit-3d-x" onclick="deleteProgram('${p.id}')" aria-label="حذف">${fitIc('trash')}</button>
      </div>
      <div class="fit-progdays">${p.days.map(d=>`<div class="fit-progday">
        <b>${esc(d.name)}</b>
        <div class="fit-chips">${d.muscles.length?d.muscles.map(m=>`<span class="fit-pill">${esc(m)}</span>`).join(''):'<span class="fit-pill">راحة</span>'}</div>
       </div>`).join('')}</div>
      ${used.length?`<div class="fit-progusers">${used.map(c=>`<span class="fit-pill">${esc(c.name)}</span>`).join('')}</div>`:''}
     </div>`}).join('')}</div>`:''}

  <h2 class="fit-sec-t">تقسيمات جاهزة</h2>
  <p class="fit-note" style="margin-bottom:12px">اختار واحدة تتضاف لبرامجك، وتقدر تعدّلها بعد كده.</p>
  <div class="fit-proglist">${PROGRAM_TEMPLATES.map((t,i)=>`
   <button class="fit-progcard" style="width:100%;text-align:right" onclick="addProgramFromTemplate(${i})">
    <div class="fit-progcard-h">
     <div class="grow"><div class="n">${esc(t.name)}</div>
      <div class="d">${t.days.length} أيام · ${esc(t.tag)}</div></div>
     <span class="fit-pill">${fitIc('plus')}إضافة</span>
    </div>
    <div class="fit-chips">${[...new Set(t.days.flatMap(d=>d.muscles))].map(m=>`<span class="fit-pill">${esc(m)}</span>`).join('')}</div>
   </button>`).join('')}</div>`;
}

function renderStats(){
 const m=STATS_MOCK, bmr=fitBmr(m), maint=fitMaintenance(m);
 const R=100, C=2*Math.PI*R, goal=Math.max(maint,1);
 const pct=Math.min(1,m.burnedToday/goal);
 return `<div class="fit-head"><h1 class="fit-h1">Stats</h1></div>
  <div class="fit-ring-wrap"><div class="fit-ring">
   <svg viewBox="0 0 230 230" aria-hidden="true">
    <circle cx="115" cy="115" r="${R}" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="12"/>
    <circle cx="115" cy="115" r="${R}" fill="none" stroke="#ff7a1a" stroke-width="12" stroke-linecap="round"
     stroke-dasharray="${C}" stroke-dashoffset="${C*(1-pct)}"/>
   </svg>
   <div class="fit-ring-c"><b>${m.burnedToday}</b><span class="u">kcal</span><span class="l">Burned today</span></div>
  </div></div>
  <div class="fit-2">
   <div class="fit-glass fit-stat"><div class="h">${fitIc('user')}Living</div>
    <div class="v">${m.burnedToday}<span>kcal</span></div><div class="l">Just being alive</div></div>
   <div class="fit-glass fit-stat"><div class="h">${fitIc('flame')}Workouts</div>
    <div class="v">${m.workoutKcal}<span>kcal</span></div></div>
  </div>
  <div class="fit-glass fit-card">
   <div class="fit-card-h"><h3>Today's workouts</h3></div>
   <p class="fit-note">No workouts logged today yet</p>
  </div>
  <div class="fit-glass fit-card">
   <div class="fit-card-h"><h3>Body metrics</h3><button class="fit-edit" onclick="toast('Editing body metrics is coming next')">Edit</button></div>
   <div class="fit-chips">
    <span class="fit-pill">${fitIc('scale')}${m.weight} kg</span>
    <span class="fit-pill">${fitIc('activity')}${m.height} cm</span>
    <span class="fit-pill">${fitIc('clock')}${m.age}</span>
    <span class="fit-pill">${fitIc('user')}${m.gender}</span>
   </div>
   <div class="fit-metrics">
    <div class="fit-metric"><b>${bmr}</b><span>Resting (BMR) · kcal/day</span></div>
    <div class="fit-metric"><b>${maint}</b><span>Daily maintenance · kcal/day</span></div>
   </div>
  </div>
  <button class="fit-start" onclick="fitStartWorkout()">${fitIc('dumbbell')}Start Workout</button>`;
}

/* ---------- Shell + routing entry ---------- */
function renderFitnessShell(view,arg){
 // The fitness section owns the whole viewport: hide the coach chrome.
 $('#bnav').style.display='none';$('#fab').style.display='none';
 fit3dDispose();   // any previous WebGL context must go before we replace #main
 let inner;
 if(view==='m')            inner=renderMuscleExercises(arg);
 else if(view==='programs')inner=renderPrograms();
 else if(view==='stats')   inner=renderStats();
 else if(view==='atlas')   {fit3dSel=(arg&&muscleOf(arg))?arg:null;inner=renderAtlas3D()}
 else                      inner=renderExercisesHome();
 $('#main').innerHTML=`<div class="fit">${inner}</div>`;
 fitRenderChrome();
 window.scrollTo(0,0);
 if(view==='atlas')fit3dInit();
}

function initAuth(){
 if(!SYNC_ENABLED){route();return}
 appPassword=localStorage.getItem(PW_KEY);
 route();
 if(appPassword){afterFirstLogin().catch(()=>{});pullChanges().catch(()=>{});flushQueue().catch(()=>{})}
}

/* ---------- Auto-expire pass + boot ---------- */
function housekeeping(){
 const t=todayS();
 db.subs.forEach(s=>{if(s.status==='active'&&dayDiff(t,s.end)<0){s.status='expired'}});
}
outbox=JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]');
db=load()||blank();
housekeeping();applyTheme();
dbSnapshot=snapshotDb();
persist();
initAuth();
/* Keep the installed app from getting stuck on an old build.
   The service worker calls skipWaiting(), but the OPEN page keeps running the
   old bundle until it reloads — which is how a user ends up staring at a
   months-old UI and reasonably concluding the app is broken. So: check for an
   update on every launch, and reload once the new worker takes control. */
if('serviceWorker' in navigator&&location.protocol==='https:'){
 navigator.serviceWorker.register('sw.js').then(reg=>{
  reg.update().catch(()=>{});
  setInterval(()=>reg.update().catch(()=>{}),36e5);
 }).catch(()=>{});
 let reloading=false;
 navigator.serviceWorker.addEventListener('controllerchange',()=>{
  if(reloading)return;reloading=true;location.reload();
 });
}
window.addEventListener('online',()=>{flushQueue();pullChanges()});
setInterval(flushQueue,60000);
setInterval(pullChanges,120000);
</script>
