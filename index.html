<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Coach OS — إدارة التدريب الشخصي</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<!-- Three.js is only ever pulled in by the 3D muscle atlas, via dynamic import().
     The import map has to be declared before the first module loads, hence here.
     If the CDN is unreachable the atlas falls back to the 2D SVG figure. -->
<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<style>
:root{
  /* Coach OS — warm dark glass + orange, matching the fitness section.
     The coach screens share these tokens, so retuning them here reskins
     every admin view at once instead of editing each render function. */
  --bg:#0e1015;
  /* Glass surfaces: translucent white over the warm gradient. s2/s3 stay
     as slightly more opaque steps for inputs and nested chips. */
  --s1:rgba(255,255,255,.055); --s2:rgba(255,255,255,.08); --s3:rgba(255,255,255,.11);
  --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.16);
  --tx:#ffffff; --tx2:#a8a29b; --tx3:#6f6a64;
  --lime:#ff7a1a; --lime-d:#e8631f; --lime-bg:rgba(255,122,26,.16);
  --violet:#fbbf5b; --violet-bg:rgba(251,191,91,.15);
  --blue:#5B8DEF; --blue-bg:rgba(91,141,239,.15);
  --orange:#f2a93b; --orange-bg:rgba(242,169,59,.16);
  --red:#ef4444; --red-bg:rgba(239,68,68,.16);
  --r:22px; --r-sm:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --font-d:'Alexandria',sans-serif; --font-b:'IBM Plex Sans Arabic',sans-serif; --font-plate:'Alexandria',sans-serif;
}
[data-theme="light"]{
  --bg:#F7F5F2; --s1:#FFFFFF; --s2:#F1EEE9; --s3:#E8E4DC;
  --line:#E3DFD6; --line2:#D2CCBD;
  --tx:#1C1B19; --tx2:#5C574C; --tx3:#8A8478;
  --lime:#D9631A; --lime-d:#B84F12; --lime-bg:rgba(217,99,26,.13);
  --violet:#B9790A; --violet-bg:rgba(185,121,10,.13);
  --blue:#3E63C2; --blue-bg:rgba(62,99,194,.13);
  --shadow:0 8px 20px rgba(20,20,20,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
svg.ic{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:-.125em;flex-shrink:0}
html{scroll-behavior:smooth}
body{background:#090b0f;color:var(--tx);font-family:var(--font-b);font-size:15px;line-height:1.55;min-height:100dvh;overscroll-behavior-y:contain}
/* Warm radial gradient behind the whole coach app, fixed so it doesn't scroll. */
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(90% 55% at 50% -8%, rgba(255,122,26,.14) 0%, rgba(255,122,26,0) 60%),
    radial-gradient(120% 90% at 50% 0%, #35220f 0%, #1b1510 32%, #0e1015 64%, #090b0f 100%);}
h1,h2,h3,h4,.disp{font-family:var(--font-d)}
.num{font-variant-numeric:tabular-nums;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--tx);background:var(--s2);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--lime)}
input[type=date],input[type=time]{color-scheme:dark}
[data-theme="light"] input[type=date],[data-theme="light"] input[type=time]{color-scheme:light}
::placeholder{color:var(--tx3)}
:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== Layout ===== */
#app{display:flex;min-height:100dvh}
#sidebar{display:none}
main{flex:1;min-width:0;padding:0 16px calc(96px + env(safe-area-inset-bottom));max-width:1180px;margin:0 auto;width:100%}
header.top{position:sticky;top:0;z-index:40;background:linear-gradient(#0e1015 60%,transparent);padding:14px 0 10px;display:flex;align-items:center;gap:10px}
header.top h1{font-size:20px;font-weight:700;flex:1}
header.top .sub{font-size:12px;color:var(--tx2);font-weight:400;display:block}
.icon-btn{width:40px;height:40px;border-radius:12px;background:var(--s2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.icon-btn:active{transform:scale(.94)}
.badge-dot{position:relative}
.badge-dot[data-n]:not([data-n="0"])::after{content:attr(data-n);position:absolute;top:-5px;left:-5px;background:var(--orange);color:#1a1005;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Bottom nav (mobile) */
#bnav{position:fixed;bottom:0;right:0;left:0;z-index:50;background:rgba(20,18,22,.82);backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
#bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;color:var(--tx3);font-size:10.5px;font-weight:600;text-decoration:none;border-radius:10px}
#bnav a .ic{font-size:20px;line-height:1}
#bnav a.on{color:var(--lime)}
#fab{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:18px;z-index:50;width:58px;height:58px;border-radius:19px;background:var(--lime);color:#141a05;font-size:27px;font-weight:700;box-shadow:0 8px 22px rgba(200,240,74,.35);display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.92)}

/* Desktop */
@media(min-width:960px){
  #bnav,#fab{display:none}
  #sidebar{display:flex;flex-direction:column;width:232px;flex-shrink:0;background:rgba(20,18,22,.55);border-left:1px solid var(--line);padding:22px 14px;position:sticky;top:0;height:100dvh;gap:4px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  #sidebar .logo{font-family:var(--font-plate);font-weight:700;font-size:19px;padding:0 10px 18px;letter-spacing:.03em}
  #sidebar .logo b{color:var(--lime)}
  #sidebar a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;color:var(--tx2);text-decoration:none;font-weight:600;font-size:14.5px}
  #sidebar a:hover{background:var(--s2);color:var(--tx)}
  #sidebar a.on{background:var(--lime-bg);color:var(--lime);box-shadow:inset 0 0 0 1px rgba(255,122,26,.22)}
  #sidebar .grow{flex:1}
  #sidebar .side-quick{margin-top:8px;background:var(--lime);color:#141a05;border-radius:12px;padding:12px;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
  main{padding:0 30px 50px}
}

/* ===== Components ===== */
.card{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:16px;
  backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);box-shadow:var(--shadow)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(2,1fr)}
@media(min-width:720px){.g4{grid-template-columns:repeat(4,1fr)}}
.row{display:flex;align-items:center;gap:10px}
.row .grow{flex:1;min-width:0}
.mt{margin-top:14px}.mt2{margin-top:22px}
.sec-h{display:flex;align-items:baseline;gap:8px;margin:22px 0 10px}
.sec-h h2{font-size:16.5px;font-weight:700}
.sec-h .more{margin-inline-start:auto;font-size:12.5px;color:var(--lime);font-weight:600;text-decoration:none}
.muted{color:var(--tx2);font-size:12.5px}
.tiny{color:var(--tx3);font-size:11.5px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:12px;padding:12px 18px;font-weight:700;font-size:14.5px;transition:transform .12s,opacity .15s;min-height:46px}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--lime);color:#141a05}
.btn-s{background:var(--s2);border:1px solid var(--line2);color:var(--tx)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid transparent}
.btn-ghost{color:var(--tx2)}
.btn-sm{padding:8px 13px;min-height:36px;font-size:13px;border-radius:10px}
.btn-block{width:100%}
.btn[disabled]{opacity:.45;pointer-events:none}

.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;background:var(--s2);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--tx2);white-space:nowrap}
.chip.on{background:var(--lime-bg);border-color:var(--lime-d);color:var(--lime)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}

.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700}
.tag.ok{background:var(--lime-bg);color:var(--lime)}
.tag.warn{background:var(--orange-bg);color:var(--orange)}
.tag.bad{background:var(--red-bg);color:var(--red)}
.tag.info{background:var(--blue-bg);color:var(--blue)}
.tag.vio{background:var(--violet-bg);color:var(--violet)}
.tag.dim{background:var(--s2);color:var(--tx3)}

/* KPI */
.kpi{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden;
  backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);box-shadow:var(--shadow)}
.kpi .v{font-family:var(--font-d);font-size:26px;font-weight:800;line-height:1.1}
.kpi .l{font-size:12px;color:var(--tx2);font-weight:600}
.kpi.hot{border-color:var(--lime-d);background:linear-gradient(160deg,var(--lime-bg),var(--s1) 55%)}
.kpi .ic{position:absolute;left:10px;top:10px;font-size:17px;opacity:.7}

/* Session ring */
.ring{width:52px;height:52px;flex-shrink:0;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-d)}
.ring .rt b{font-size:15px;line-height:1}
.ring .rt span{font-size:7.5px;color:var(--tx3);font-weight:600}

/* Body map (muscle atlas + recovery widget) */
.body-map-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.body-map{width:100%;max-width:230px;height:auto}
.body-map.lg{max-width:320px}
.mgroup{fill:url(#muscleGrad);stroke:var(--line2);stroke-width:1.25;cursor:pointer;transition:filter .15s,stroke .15s}
.mgroup:hover{filter:brightness(1.22)}
.mgroup.sel{stroke:var(--tx);stroke-width:2.25;filter:brightness(1.15)}
.mgroup.ok{fill:var(--blue)!important}
.mgroup.warn{fill:var(--violet)!important}
.mgroup.bad{fill:var(--lime)!important}
.body-outline{fill:url(#skinGrad);stroke:var(--line2);stroke-width:1.1}
.fiber-line{stroke:var(--bg);stroke-width:.7;fill:none;opacity:.35;pointer-events:none}
.body-toggle{display:flex;gap:6px}

/* Exercise cards (muscle atlas) */

/* Atlas split layout (desktop side panel / mobile bottom sheet) */
@media(min-width:900px){
}

/* Client card */
.ccard{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;transition:border-color .15s}
.ccard:active{border-color:var(--lime-d)}
.avatar{width:46px;height:46px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:14.5px;letter-spacing:-.02em;color:var(--lime);flex-shrink:0;border:1px solid var(--line2);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.ccard .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ccard .meta{font-size:11.5px;color:var(--tx2);display:flex;gap:9px;flex-wrap:wrap;margin-top:3px}

/* Lists */
.list{display:flex;flex-direction:column;gap:9px}
.li{background:var(--s1);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.li .t{font-weight:700;font-size:14px}
.li .d{font-size:12px;color:var(--tx2);margin-top:2px}

/* Search */
.search{position:relative;margin:4px 0 12px}
.search input{padding-inline-start:38px;background:var(--s1)}
.search .ic{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:15px}

/* Tabs */
.tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin:8px 0 16px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{padding:10px 14px;font-weight:700;font-size:13.5px;color:var(--tx3);border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--lime);border-bottom-color:var(--lime)}

/* Modal */
#modal-bk{position:fixed;inset:0;background:rgba(5,7,3,.72);z-index:90;display:none;backdrop-filter:blur(3px)}
#modal{position:fixed;z-index:95;inset-inline:0;bottom:0;max-height:92dvh;overflow-y:auto;background:var(--s1);border:1px solid var(--line2);border-bottom:none;border-radius:22px 22px 0 0;padding:10px 18px calc(22px + env(safe-area-inset-bottom));display:none;animation:up .22s ease}
#modal .handle{width:42px;height:4px;border-radius:4px;background:var(--line2);margin:4px auto 14px}
#modal h3{font-size:17.5px;margin-bottom:14px}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
@media(min-width:960px){#modal{inset:0;margin:auto;max-width:560px;height:fit-content;max-height:86dvh;border-radius:18px;border-bottom:1px solid var(--line2)}}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:12.5px;font-weight:700;color:var(--tx2);margin-bottom:6px}
.f-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Toast */
#toast{position:fixed;bottom:calc(140px + env(safe-area-inset-bottom));inset-inline:0;display:flex;justify-content:center;z-index:120;pointer-events:none}
#toast div{background:var(--s3);border:1px solid var(--line2);color:var(--tx);padding:11px 20px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);animation:up .2s ease}
@media(min-width:960px){#toast{bottom:40px}}

/* Timeline */
.tl-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px dashed var(--line)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-family:var(--font-d);font-weight:700;font-size:13px;color:var(--violet);width:52px;flex-shrink:0;padding-top:2px}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cal-head h3{flex:1;text-align:center;font-size:15.5px}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day{background:var(--s1);border:1px solid var(--line);border-radius:10px;min-height:74px;padding:6px 5px;font-size:11px;cursor:pointer}
.cal-day .dn{font-family:var(--font-d);font-weight:700;font-size:13px}
.cal-day.today{border-color:var(--lime-d);background:var(--lime-bg)}
.cal-day .pill{margin-top:3px;background:var(--violet-bg);color:var(--violet);border-radius:5px;padding:1px 4px;font-size:9.5px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-day .cnt{margin-top:3px;color:var(--tx3);font-size:9.5px}

/* Progress bar */
.pbar{height:7px;border-radius:5px;background:var(--s3);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:5px;background:var(--lime)}

/* Empty state */
.empty{text-align:center;padding:44px 20px;color:var(--tx3)}
.empty .big{font-size:38px;margin-bottom:10px}
.empty p{font-size:13.5px;max-width:280px;margin:0 auto 16px}

/* Skeleton */
.skel{border-radius:var(--r);background:linear-gradient(90deg,var(--s1),var(--s2),var(--s1));background-size:200% 100%;animation:sk 1.1s infinite;height:70px;margin-bottom:10px}
@keyframes sk{to{background-position:-200% 0}}

table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;color:var(--tx3);font-size:11.5px;padding:8px 6px;border-bottom:1px solid var(--line)}
.tbl td{padding:9px 6px;border-bottom:1px solid var(--line)}
.chart-box{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:14px;height:250px}
.pin-note{background:var(--orange-bg);border:1px solid rgba(255,138,76,.3);border-radius:var(--r-sm);padding:11px 13px;font-size:13.5px;display:flex;gap:9px;align-items:flex-start}
.ex-row{display:grid;grid-template-columns:1.6fr .6fr .6fr .7fr auto;gap:6px;margin-bottom:7px;align-items:center}
.ex-row input{padding:9px 8px;font-size:13px}
.del-x{color:var(--red);font-size:17px;padding:4px 6px}
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;background:radial-gradient(ellipse 70% 55% at 50% 8%,var(--s2) 0%,var(--bg) 70%)}
.login-wrap .bg-mark{position:absolute;top:48%;left:50%;transform:translate(-50%,-46%);width:560px;max-width:150vw;opacity:.05;pointer-events:none;z-index:0}
.login-wrap .bg-mark .body-map{max-width:none;width:100%}
.login-wrap .bg-mark .mgroup{fill:var(--tx);stroke:none}
.login-wrap .bg-mark .body-outline{stroke:var(--tx);fill:none}
.login-card{width:100%;max-width:380px;position:relative;z-index:1}
.login-card .seal{width:56px;height:56px;border-radius:50%;border:1.5px solid var(--lime-d);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;background:var(--s1);box-shadow:0 0 0 5px var(--lime-bg)}
.login-card .eyebrow{text-align:center;font-size:10.5px;letter-spacing:.22em;color:var(--tx3);text-transform:uppercase;font-family:var(--font-plate);margin-bottom:6px}
.login-card .logo{font-family:var(--font-plate);font-weight:700;font-size:32px;text-align:center;letter-spacing:.03em}
.login-card .logo b{color:var(--lime)}
.login-card .rule{width:46px;height:2px;background:var(--lime-d);margin:14px auto 24px;border-radius:2px;opacity:.8}
/* ---------- Trainee portal ----------
   Renders inside #login-screen, outside the coach shell, so it needs its own
   type scale and surfaces. Same dark-glass-orange language as the rest. */
.portal{max-width:560px;margin:0 auto;padding:22px 16px 48px}
.p-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.p-av{width:54px;height:54px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-d);font-weight:800;font-size:16px;color:#fff;
  background:linear-gradient(145deg,var(--lime),#e2600d);box-shadow:0 6px 18px rgba(255,122,26,.35)}
.p-head h1{font-family:var(--font-d);font-size:23px;font-weight:800;line-height:1.15}
.p-head p{font-size:13px;color:var(--tx2);margin-top:3px}
.p-card{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;
  backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);box-shadow:var(--shadow)}
.p-row{display:flex;align-items:center;gap:8px}
.p-muted{color:var(--tx2);font-size:12.5px}
.p-h2{font-family:var(--font-d);font-size:18px;font-weight:800;margin:22px 0 11px;display:flex;align-items:center;gap:10px}
/* Next session — the reason the trainee opens this at all, so it leads. */
.p-next{border-radius:var(--r);padding:18px;margin-bottom:12px;
  background:linear-gradient(150deg,rgba(255,122,26,.22),rgba(255,122,26,.05));
  border:1px solid rgba(255,122,26,.34);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.p-next-l{font-size:12.5px;color:var(--lime);font-weight:700}
.p-next-d{font-family:var(--font-d);font-size:25px;font-weight:800;margin-top:4px;line-height:1.15}
.p-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.p-chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;
  background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--tx2)}
.p-chip.on{background:rgba(255,122,26,.18);border-color:rgba(255,122,26,.4);color:var(--lime)}
.p-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.p-stat{text-align:center}
.p-stat b{display:block;font-family:var(--font-d);font-size:29px;font-weight:800;line-height:1.1}
.p-stat b i{font-style:normal;font-size:13px;color:var(--tx2);font-weight:600}
.p-stat span{font-size:12px;color:var(--tx2)}
.p-list{display:flex;flex-direction:column;gap:9px}
.p-li{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:13px 15px;font-size:13.5px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
/* Calorie hero */
.p-cal{border-radius:var(--r);padding:20px 16px;margin:12px 0;text-align:center;
  background:var(--s1);border:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.p-cal-l{font-size:12.5px;color:var(--tx2)}
.p-cal-v{font-family:var(--font-d);font-size:44px;font-weight:800;color:var(--lime);line-height:1.05;margin:2px 0}
.p-cal-s{font-size:12px;color:var(--tx2)}
.p-macros{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}
.p-macros div{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:11px 6px}
.p-macros b{display:block;font-family:var(--font-d);font-size:19px;font-weight:800}
.p-macros span{font-size:11px;color:var(--tx2)}
.p-cui{display:flex;gap:6px;margin-right:auto}
.food-row{border-radius:9px;transition:background .12s}
.food-row:hover{background:rgba(255,255,255,.05)}
.food-row:active{transform:scale(.995)}
.p-meal .p-food{display:flex;gap:8px;font-size:13px;padding:5px 0}
.p-meal .p-food b{font-variant-numeric:tabular-nums}
.p-kcal{font-size:11.5px;font-weight:700;color:var(--lime);background:var(--lime-bg);padding:4px 10px;border-radius:999px}
.p-spark{width:100%;height:64px;display:block;margin:10px 0 4px}
.p-delta{font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--s3);color:var(--tx2)}
.p-delta.down{background:var(--lime-bg);color:var(--lime)}
.p-delta.up{background:var(--blue-bg);color:var(--blue)}
.p-foot{text-align:center;font-size:11px;color:var(--tx3);margin-top:26px}

/* ============================================================
   FITNESS SECTION — Exercises / Programs / Stats
   Dark premium mobile fitness UI. Everything is scoped under
   `.fit` so none of it leaks into the coach/admin screens.
   ============================================================ */
/* Tokens live on :root, not on `.fit` — the floating nav and workout bar
   render inside #fit-chrome, which is a sibling of the .fit subtree and so
   cannot inherit custom properties scoped to it. */
:root{
  --fit-accent:#ff7a1a; --fit-accent-2:#ff8a2a; --fit-accent-3:#fb923c;
  --fit-glass:rgba(255,255,255,.055); --fit-brd:rgba(255,255,255,.10);
  --fit-tx:#fff; --fit-tx2:#a8a29b; --fit-tx3:#6f6a64;
}
.fit{
  direction:ltr;text-align:left;
  margin:0 -16px;padding:0 18px calc(190px + env(safe-area-inset-bottom));
  min-height:100dvh;position:relative;color:var(--fit-tx);
}
@media(min-width:960px){.fit{margin:0 -30px}}
/* Full-bleed gradient behind everything, including the floating chrome */
.fit::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(90% 55% at 50% -8%, rgba(255,122,26,.20) 0%, rgba(255,122,26,0) 60%),
    radial-gradient(120% 90% at 50% 0%, #35220f 0%, #1b1510 30%, #0e1015 62%, #090b0f 100%);}
.fit-glass{background:var(--fit-glass);border:1px solid var(--fit-brd);border-radius:26px;
  backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);
  box-shadow:0 10px 30px rgba(0,0,0,.35)}
.fit-h1{font-family:var(--font-d);font-size:38px;line-height:1.1;font-weight:800;letter-spacing:-.02em;color:#fff}
.fit-sub{color:var(--fit-tx2);font-size:15px;margin-top:6px}
.fit-head{padding:26px 0 18px}
.fit-sec-t{font-size:21px;font-weight:800;color:#fff;margin:26px 0 12px;font-family:var(--font-d)}
.fit-accent-txt{color:var(--fit-accent)}

/* Summary card (flame / kcal burned today) */
.fit-summary{display:flex;align-items:center;gap:14px;padding:14px 16px;width:100%;text-align:left;color:inherit}
.fit-summary .fit-orb{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--fit-accent-2),#e2600d);color:#fff;font-size:22px;flex-shrink:0;
  box-shadow:0 6px 18px rgba(255,122,26,.4)}
.fit-summary .v{display:block;font-size:26px;font-weight:800;font-family:var(--font-d);line-height:1.1}
.fit-summary .v span{font-size:13px;font-weight:600;color:var(--fit-tx2);margin-left:4px}
.fit-summary .l{display:block;font-size:12.5px;color:var(--fit-tx2);margin-top:2px}
.fit-summary .chev{margin-left:auto;color:var(--fit-tx2);font-size:20px}

/* Muscle group grid */
.fit-mgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fit-mcell{display:flex;flex-direction:column;gap:9px;text-align:center;background:none;padding:0}
.fit-mcard{position:relative;border-radius:24px;aspect-ratio:1/.92;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(165deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--fit-brd);overflow:hidden;transition:transform .16s,border-color .16s}
.fit-mcard::after{content:'';position:absolute;inset:-40% -40% auto auto;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,var(--g,#ff7a1a) 0%,transparent 65%);opacity:.20;pointer-events:none}
.fit-mcell:active .fit-mcard{transform:scale(.97)}
.fit-mcard:hover{border-color:color-mix(in srgb,var(--g,#ff7a1a) 55%,transparent)}
.fit-mini{height:118px;width:auto;display:block}
.fit-mini-cardio{height:72px}
.fit-badge{position:absolute;right:9px;bottom:9px;background:var(--g,#ff7a1a);color:#fff;font-size:11.5px;font-weight:800;
  padding:3px 9px;border-radius:9px;letter-spacing:.01em;font-variant-numeric:tabular-nums;
  box-shadow:0 3px 10px rgba(0,0,0,.35)}
.fit-mname{font-size:15px;font-weight:700;color:#fff}

/* Back button + pill tabs */
.fit-back{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--fit-glass);border:1px solid var(--fit-brd);color:#fff;font-size:19px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.fit-back:active{transform:scale(.93)}
.fit-tabs{display:flex;gap:6px;padding:5px;border-radius:999px;background:rgba(255,255,255,.06);
  border:1px solid var(--fit-brd);margin-bottom:20px}
.fit-tabs button{flex:1;padding:11px 0;border-radius:999px;font-size:14.5px;font-weight:700;color:var(--fit-tx2)}
.fit-tabs button.on{background:linear-gradient(135deg,var(--fit-accent-2),#e8630f);color:#fff;
  box-shadow:0 4px 14px rgba(255,122,26,.35)}

/* Exercise cards */
.fit-exgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fit-ex{border-radius:24px;overflow:hidden;background:var(--fit-glass);border:1px solid var(--fit-brd);
  display:flex;flex-direction:column;transition:transform .16s}
.fit-ex:active{transform:scale(.98)}
/* Matches the plate the anatomy renders are baked onto, so there is no seam. */
.fit-ex-media{position:relative;aspect-ratio:1/.84;overflow:hidden;background:#f4f6f8}
.fit-ex-media>img,.fit-ex-media>svg.fit-ex-fb{position:absolute;inset:0;width:100%;height:100%;display:block}
/* The photo is only revealed once it has actually decoded. Until then (or
   forever, if the file isn't shipped) the fallback illustration shows through,
   so a missing asset can never paint a blank white card. */
.fit-ex-media>img{object-fit:cover;z-index:1;background:#f4f6f8;opacity:0;transition:opacity .2s}
.fit-ex-media>img.is-loaded{opacity:1}
.fit-ex-body{padding:12px 12px 14px;display:flex;flex-direction:column;gap:10px;flex:1}
.fit-ex-name{font-size:14.5px;font-weight:700;color:#fff;line-height:1.3}
.fit-ex-foot{display:flex;align-items:center;gap:8px;margin-top:auto}
.fit-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:11.5px;
  font-weight:600;color:var(--fit-tx2);background:rgba(255,255,255,.07);border:1px solid var(--fit-brd);white-space:nowrap}
.fit-diff{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.fit-diff i{width:9px;height:4px;border-radius:2px;background:rgba(255,255,255,.16)}
.fit-diff i.on{background:var(--fit-accent)}

/* Programs — horizontal scrollers */

/* Stats */
.fit-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 0 6px}
.fit-ring{position:relative;width:230px;height:230px}
.fit-ring svg{transform:rotate(-90deg);width:100%;height:100%}
.fit-ring .fit-ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fit-ring .fit-ring-c b{font-family:var(--font-d);font-size:54px;font-weight:800;line-height:1;color:#fff}
.fit-ring .fit-ring-c .u{font-size:15px;color:var(--fit-tx2);margin-top:6px}
.fit-ring .fit-ring-c .l{font-size:13px;color:var(--fit-tx3);margin-top:2px}
.fit-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.fit-stat{padding:16px}
.fit-stat .h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#fff}
.fit-stat .v{font-family:var(--font-d);font-size:26px;font-weight:800;margin-top:10px;color:#fff}
.fit-stat .v span{font-size:13px;font-weight:600;color:var(--fit-tx2);margin-left:4px}
.fit-stat .l{font-size:12px;color:var(--fit-tx2);margin-top:4px}
.fit-card{padding:18px;margin-top:14px}
.fit-card-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.fit-card-h h3{font-size:19px;font-weight:800;color:#fff;font-family:var(--font-d);flex:1}
.fit-edit{padding:7px 15px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--fit-brd);
  color:var(--fit-accent);font-size:13px;font-weight:700}
.fit-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.fit-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fit-metric{background:rgba(255,255,255,.05);border:1px solid var(--fit-brd);border-radius:16px;padding:14px;text-align:center}
.fit-metric b{display:block;font-family:var(--font-d);font-size:26px;font-weight:800;color:#fff}
.fit-metric span{font-size:11.5px;color:var(--fit-tx2)}
.fit-note{color:var(--fit-tx2);font-size:14px}
.fit-start{position:sticky;bottom:calc(160px + env(safe-area-inset-bottom));margin-top:22px;width:100%;
  display:flex;align-items:center;justify-content:center;gap:9px;padding:17px;border-radius:999px;
  background:linear-gradient(135deg,var(--fit-accent-2),#e8630f);color:#fff;font-size:16px;font-weight:800;
  box-shadow:0 10px 30px rgba(255,122,26,.42)}
.fit-start:active{transform:scale(.98)}

/* 3D muscle atlas */
.fit-3d-stage{position:relative;height:min(58vh,470px);border-radius:26px;overflow:hidden;
  background:radial-gradient(70% 60% at 50% 30%,rgba(255,122,26,.10),transparent 70%);
  touch-action:none}
.fit-3d-stage canvas{display:block;width:100%;height:100%}
.fit-3d-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;color:var(--fit-tx2);font-size:14px;text-align:center;padding:24px}
.fit-3d-msg .fit-spin{width:30px;height:30px;border-radius:50%;border:3px solid rgba(255,255,255,.14);
  border-top-color:var(--fit-accent);animation:fit-spin .8s linear infinite}
@keyframes fit-spin{to{transform:rotate(360deg)}}
.fit-3d-ctrl{display:flex;justify-content:center;gap:10px;margin-top:14px}
.fit-3d-ctrl button{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:999px;
  background:var(--fit-glass);border:1px solid var(--fit-brd);color:#fff;font-size:13.5px;font-weight:700;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.fit-3d-ctrl button:active{transform:scale(.96)}
.fit-3d-sheet{margin-top:16px;padding:18px;border-radius:26px;background:var(--fit-glass);
  border:1px solid var(--fit-brd);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.fit-3d-sheet h3{font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff}
.fit-3d-sheet .ar{font-size:13px;color:var(--fit-accent);margin-top:2px;font-weight:700}
.fit-3d-sheet .fn{font-size:14px;color:var(--fit-tx2);line-height:1.7;margin-top:10px}
.fit-3d-sheet .fit-chips{margin-top:10px}
.fit-3d-sheet .rec{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12.5px;color:var(--fit-tx2)}
.fit-3d-sheet .rec b{color:#fff;font-weight:700}
.fit-3d-head{display:flex;align-items:flex-start;gap:10px}
.fit-3d-x{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;background:rgba(255,255,255,.08);border:1px solid var(--fit-brd);color:#fff;font-size:15px}
.fit-subtabs{display:flex;gap:4px;padding:4px;border-radius:999px;background:rgba(255,255,255,.05);
  border:1px solid var(--fit-brd);margin-top:14px}
.fit-subtabs button{flex:1;padding:9px 0;border-radius:999px;font-size:12.5px;font-weight:700;color:var(--fit-tx2)}
.fit-subtabs button.on{background:linear-gradient(135deg,var(--fit-accent-2),#e8630f);color:#fff}
.fit-3d-body{margin-top:16px}
.fit-sub2{display:flex;align-items:center;gap:7px;margin:18px 0 8px;font-size:13px;font-weight:700;color:#fff}
.fit-bullets{list-style:none;display:flex;flex-direction:column;gap:9px}
.fit-bullets li{position:relative;padding-right:16px;font-size:13.5px;line-height:1.7;color:var(--fit-tx2)}
.fit-bullets li::before{content:'';position:absolute;right:0;top:9px;width:6px;height:6px;border-radius:50%;
  background:var(--fit-accent)}
.fit-equip{margin-bottom:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.05);
  border:1px solid var(--fit-brd)}
.fit-equip .e{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px}
.fit-exlist{display:flex;flex-direction:column;gap:9px}
.fit-exrow{display:flex;align-items:center;gap:11px;padding:12px;border-radius:16px;
  background:rgba(255,255,255,.05);border:1px solid var(--fit-brd)}
.fit-exrow-i{width:36px;height:36px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;background:rgba(255,122,26,.14);color:var(--fit-accent);font-size:16px}
.fit-exrow .n{font-size:13.5px;font-weight:700;color:#fff}
.fit-exrow .d{font-size:11.5px;color:var(--fit-tx2);margin-top:3px}
.fit-exrow-t{flex-shrink:0;font-size:10.5px;font-weight:700;padding:4px 8px;border-radius:7px}
.fit-exrow-t.c{background:rgba(255,122,26,.16);color:var(--fit-accent-3)}
.fit-exrow-t.i{background:rgba(91,141,239,.16);color:#8fb0f5}
.fit-3d-more{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:14px;
  padding:14px;border-radius:999px;background:rgba(255,122,26,.12);border:1px solid rgba(255,122,26,.3);
  color:var(--fit-accent);font-size:13.5px;font-weight:700}
.fit-3d-more:active{transform:scale(.98)}
.fit-legend{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;
  font-size:11.5px;color:var(--fit-tx2)}
.fit-legend i{width:12px;height:12px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-2px}
.fit-credit{margin-top:22px;font-size:10.5px;line-height:1.7;color:var(--fit-tx3);text-align:center}

/* Programs */
.fit-proglist{display:flex;flex-direction:column;gap:12px}
.fit-progcard{background:var(--fit-glass);border:1px solid var(--fit-brd);border-radius:24px;padding:16px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:block}
.fit-progcard-h{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.fit-progcard .n{font-size:16.5px;font-weight:800;color:#fff}
.fit-progcard .d{font-size:12.5px;color:var(--fit-tx2);margin-top:3px}
.fit-progdays{display:flex;flex-direction:column;gap:9px}
.fit-progday{background:rgba(255,255,255,.05);border:1px solid var(--fit-brd);border-radius:16px;padding:11px 13px}
.fit-progday b{display:block;font-size:13px;color:#fff;margin-bottom:7px}
.fit-progusers{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:11px;border-top:1px solid var(--fit-brd)}

/* Empty state */
.fit-empty{text-align:center;padding:60px 20px;color:var(--fit-tx2)}
.fit-empty svg.ic{font-size:44px;opacity:.35;margin-bottom:14px}
.fit-empty p{font-size:14.5px}

/* Floating workout-in-progress bar */
/* #fit-chrome lives outside .fit, so it inherits the document's RTL direction
   and would mirror the bar and the nav. Both are LTR by design. */
#fit-workout{direction:ltr;position:fixed;z-index:70;left:14px;right:14px;bottom:calc(88px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:28px;
  background:rgba(28,24,22,.72);border:1px solid rgba(255,122,26,.45);
  backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);
  box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(255,122,26,.08);
  max-width:520px;margin:0 auto;transition:max-width .25s,padding .25s}
#fit-workout .fit-orb{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;background:linear-gradient(145deg,var(--fw-a,#ff8a2a),#e2600d);color:#fff;font-size:18px}
#fit-workout .fit-wt{flex:1;min-width:0}
#fit-workout .fit-wt b{display:block;font-size:14.5px;font-weight:700;color:#fff;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
#fit-workout .fit-wt span{font-size:12.5px;color:#a8a29b;font-variant-numeric:tabular-nums}
#fit-workout button{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#a8a29b;font-size:16px;flex-shrink:0}
#fit-workout button.fit-wclose{background:rgba(255,255,255,.10);color:#fff}
#fit-workout.is-collapsed{max-width:74px;padding:9px}
#fit-workout.is-collapsed .fit-wt,#fit-workout.is-collapsed .fit-wclose{display:none}

/* Floating bottom navigation */
#fit-nav{direction:ltr;position:fixed;z-index:75;left:14px;right:14px;bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:2px;padding:8px 6px;border-radius:32px;max-width:520px;margin:0 auto;
  background:rgba(24,22,26,.78);border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
  box-shadow:0 12px 34px rgba(0,0,0,.55)}
#fit-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border-radius:24px;
  color:#7d7873;font-size:10.5px;font-weight:700;text-decoration:none;transition:color .16s,background .16s}
#fit-nav a svg.ic{font-size:21px}

function nutritionFor(cid){

 const m=lastMeas(cid);
 const w=m&&m.weight, h=c.height||(m&&m.height);   // client height wins; measurements rarely carry it
 const missing=[];
 if(!w)missing.push('الوزن');
 if(!h)missing.push('الطول');
 if(!c.age)missing.push('السن');
 if(missing.length)return{missing};

 const act=c.activity||1.55;

 const bmrRaw=mifflin(w,h,c.age,isMale(c));

 const targetRaw=tdeeRaw*(1+plan.pct);

 // On an aggressive cut, g/kg protein can eat most of the budget, so cap it at
 // 40% of calories — otherwise the meal plan asks for absurd portions.
 let protein=Math.round(plan.protein*w);

 const fat=Math.max(Math.round(0.6*w),Math.round(0.8*w));
 const carbs=Math.max(0,Math.round((targetRaw-protein*4-fat*9)/4));

 return{weight:w,height:h,age:c.age,male:isMale(c),activity:act,goal:c.goal||'لياقة',
  bmr:Math.round(bmrRaw),tdee:Math.round(tdeeRaw),target:Math.round(targetRaw),
  delta:Math.round(targetRaw-tdeeRaw),note:plan.note,
  macros:{protein,carbs,fat},

}

const FOOD_MAX={
 // fats: dense, keep small

 avocado:150,chia:40,roumy:60,

/* Portion the whole day at once.

   Scaling each meal by one calorie factor gets calories right and protein badly
   wrong — a 3000 kcal bulk lands at 3.5 g/kg protein, a cut lands short. Solving
   each meal independently is worse: a snack whose only protein is yogurt is told
   to deliver its full protein share, and asks for 660 g of it.

   So we solve once, across the day, for three scale factors — one each for the
   protein, carb and fat foods — hitting all three macro targets simultaneously:

       sp*Pp + sc*Pc + sf*Pf = Ptarget - Pveg
       sp*Fp + sc*Fc + sf*Ff = Ftarget - Fveg
       sp*Kp + sc*Kc + sf*Kf = Ktarget - Kveg

   Vegetables keep their base portion. Three equations, three unknowns, Cramer's
   rule. Singular systems fall back to plain calorie scaling. Scales are clamped,
   portions capped by FOOD_MAX, and grams rounded to 5 so a kitchen scale can
   actually hit them — all of which reintroduce a little error, so the caller is
   shown the plan's ACTUAL macros rather than the targets. */
function solve3(a,b){
 const d=(m)=>m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
              -m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
              +m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
 const det=d(a);
 if(Math.abs(det)<1e-9)return null;
 const col=(m,i,v)=>m.map((r,j)=>r.map((x,k)=>k===i?v[j]:x));
 return [0,1,2].map(i=>d(col(a,i,b))/det);
}

function mealPlan(targetKcal,cuisine,targetProtein,targetFat,swaps){
 // `swaps` maps an original template key to its replacement (same grp+role),
 // applied BEFORE the solver runs so portions are recomputed for the new
 // food's macros rather than reusing the old grams.
 const sw=swaps||{};
 const swapOf=k=>(sw[k]&&FOOD[sw[k]])?sw[k]:k;
 const tpl=(CUISINES[cuisine]||CUISINES.egy).meals
   .map(items=>items.map(([k,g])=>[swapOf(k),g]));
 const all=tpl.flatMap((items,mi)=>items.map(([k,g])=>({k,g,mi})));
 const sum=(role,fn)=>all.filter(x=>FOOD[x.k].role===role)
                         .reduce((a,x)=>a+fn(FOOD[x.k])*x.g/100,0);

 const veg={p:sum('v',f=>f.p),f:sum('v',f=>f.f),k:sum('v',f=>f.kcal)};
 const A=[
  [sum('p',f=>f.p),    sum('c',f=>f.p),    sum('f',f=>f.p)],
  [sum('p',f=>f.f),    sum('c',f=>f.f),    sum('f',f=>f.f)],
  [sum('p',f=>f.kcal), sum('c',f=>f.kcal), sum('f',f=>f.kcal)]
 ];
 const b=[(targetProtein||0)-veg.p,(targetFat||0)-veg.f,targetKcal-veg.k];

 let s=solve3(A,b);
 if(!s||s.some(x=>!isFinite(x))){
  const kAll=A[2][0]+A[2][1]+A[2][2];
  const u=kAll?(targetKcal-veg.k)/kAll:1;
  s=[u,u,u];
 }
 const clamp=x=>Math.min(3.5,Math.max(0.25,x>0?x:0.25));
 const [sp,sc,sf]=s.map(clamp);
 const scaleOf={p:sp,c:sc,f:sf,v:1};

 // Apply the scales, then clip to the per-serving ceilings.
 const grams=all.map(x=>Math.min(x.g*scaleOf[FOOD[x.k].role],FOOD_MAX[x.k]||400));

 // Clipping loses calories on a big bulk (450 g of rice is not enough on its
 // own), so push the shortfall onto whichever foods still have headroom.
 // Protein first, because it is the macro that matters, then calories via carbs.
 const now=()=>grams.reduce((t,g,i)=>{
  const f=FOOD[all[i].k],r=g/100;
  t.p+=f.p*r;t.k+=f.kcal*r;return t;
 },{p:0,k:0});
 const refill=(role,deficitOf)=>{
  for(let pass=0;pass<6;pass++){
   const need=deficitOf(now());
   if(need<=1)break;
   const idx=all.map((x,i)=>i).filter(i=>FOOD[all[i].k].role===role
     && grams[i]<(FOOD_MAX[all[i].k]||400)-1);
   if(!idx.length)break;
   const head=idx.reduce((a,i)=>a+((FOOD_MAX[all[i].k]||400)-grams[i]),0);
   if(head<1)break;
   idx.forEach(i=>{
    const room=(FOOD_MAX[all[i].k]||400)-grams[i];
    grams[i]=Math.min(grams[i]+room,grams[i]+room*Math.min(1,need/Math.max(1,head)*3));
   });
  }
 };
 refill('p',t=>(targetProtein||0)-t.p);
 refill('c',t=>(targetKcal-t.k)/4);   // grams of carb still needed
 refill('f',t=>(targetKcal-t.k)/9);

 let gi=0;
 const meals=tpl.map((items,mi)=>{
  const portioned=items.map(([k])=>[k,Math.max(5,Math.round(grams[gi++]/5)*5)]);
  return{name:MEAL_NAMES[mi],items:portioned,totals:mealTotals(portioned)};
 });
 const day=meals.reduce((t,m)=>{
  t.kcal+=m.totals.kcal;t.p+=m.totals.p;t.c+=m.totals.c;t.f+=m.totals.f;return t;
 },{kcal:0,p:0,c:0,f:0});

 /* Caps and swaps can make a target genuinely unreachable — a vegetarian on a
    tight cut cannot hit 2 g/kg from tofu alone. Report the miss instead of
    silently handing the coach a plan that misses by 20%. */
 const warn=[];
 const kOff=targetKcal?((day.kcal-targetKcal)/targetKcal)*100:0;
 const pOff=targetProtein?((day.p-targetProtein)/targetProtein)*100:0;
 if(Math.abs(kOff)>10)warn.push(`السعرات ${kOff>0?'أعلى':'أقل'} من الهدف بـ ${Math.abs(Math.round(kOff))}%`);
 if(Math.abs(pOff)>12)warn.push(`البروتين ${pOff>0?'أعلى':'أقل'} من الهدف بـ ${Math.abs(Math.round(pOff))}% — جرّب بديل أغنى بالبروتين`);
 return{meals,day,warn};
}

/* ============================================================
   TRAINING INTELLIGENCE
   Which muscle should this trainee hit today? Rank the coarse muscle
   groups by recovery debt: how long since it was trained, against how
   long that muscle actually needs. Never-trained groups come first.
   ============================================================ */
const TRAINABLE=MUSCLES.filter(m=>m!=='كارديو'&&m!=='Full Body');

/* Recovery window for a coarse group = the slowest muscle inside it. */
const groupRecoveryHours=coarse=>{
 const ids=COARSE_MUSCLE_MAP[coarse]||[];
 return ids.reduce((mx,id)=>Math.max(mx,(muscleOf(id)||{recovery:48}).recovery),0)||48;
};

/* Last day this trainee trained a coarse group, from either the session's
   muscle chips or the exercises actually logged in it. */
function lastTrainedDay(cid,coarse){
 const ids=COARSE_MUSCLE_MAP[coarse]||[];
 const done=db.sessions.filter(s=>s.clientId===cid&&s.status==='done')
   .sort((a,b)=>b.date.localeCompare(a.date));
 for(const s of done){
  const byChip=(s.muscles||[]).includes(coarse);
  const byEx=(s.exercises||[]).some(e=>{const ex=e.exId&&exerciseOf(e.exId);
    return ex&&ex.primary.some(p=>ids.includes(p))});
  if(byChip||byEx)return s.date;
 }
 return null;
}

/* Ratio > 1 means recovered and overdue. null date sorts to the very front:
   a muscle that has never been trained is the most neglected thing there is. */
function suggestNextMuscles(cid){
 const rows=TRAINABLE.map(m=>{
  const d=lastTrainedDay(cid,m);
  const rec=groupRecoveryHours(m);
  const hrs=d?(Date.now()-D(d).getTime())/36e5:Infinity;
  const days=d?Math.floor(hrs/24):null;
  return{muscle:m,lastDate:d,days,recovery:rec,hours:hrs,ratio:hrs/rec,ready:hrs>=rec};
 });
 rows.sort((a,b)=>b.ratio-a.ratio);
 return rows;
}
const suggestReason=r=>r.lastDate===null
 ? 'لسه متدربتش خالص'
 : r.ready
   ? `آخر مرة من ${r.days} يوم — متعافية وجاهزة`
   : `آخر مرة من ${r.days} يوم — لسه بتتعافى (${r.recovery} ساعة)`;

   markDone so the subscription deduction stays in exactly one place. */

/* ---------- Derived / computed ---------- */
const client=id=>db.clients.find(c=>c.id===id);
const activeSub=cid=>db.subs.find(s=>s.clientId===cid&&s.status==='active');
const anySub=cid=>db.subs.filter(s=>s.clientId===cid).sort((a,b)=>b.createdAt.localeCompare(a.createdAt))[0];
const remaining=cid=>{const s=activeSub(cid);return s?Math.max(0,s.total-s.used):0};
const lastDone=cid=>db.sessions.filter(s=>s.clientId===cid&&s.status==='done').sort((a,b)=>b.date.localeCompare(a.date))[0];
const lastMeas=cid=>db.meas.filter(m=>m.clientId===cid).sort((a,b)=>b.date.localeCompare(a.date))[0];
const balance=cid=>{const s=activeSub(cid);return s?Math.max(0,(s.price||0)-(s.paid||0)):0};

function statusOf(c){
 if(c.archived)return{k:'archived',t:'أرشيف',cls:'dim'};
 const s=activeSub(c.id), frozen=db.subs.find(x=>x.clientId===c.id&&x.status==='frozen');
 if(!s&&frozen)return{k:'frozen',t:'مجمّد',cls:'info'};
 if(!s||dayDiff(todayS(),s.end)<0)return{k:'expired',t:'منتهي',cls:'bad'};
 if(balance(c.id)>0)return{k:'pay',t:'متأخر دفع',cls:'warn'};
 if(remaining(c.id)<=1)return{k:'low',t:'سيشنات قليلة',cls:'warn'};
 const ld=lastDone(c.id);
 if(ld&&dayDiff(ld.date,todayS())>10)return{k:'follow',t:'يحتاج متابعة',cls:'warn'};
 return{k:'active',t:'نشط',cls:'ok'};
}

function computeAlerts(){
 const A=[];const t=todayS();
 db.clients.filter(c=>!c.archived).forEach(c=>{
  const s=activeSub(c.id);
  if(s){const left=dayDiff(t,s.end);
   if(left>=0&&left<=7)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-hourglass"/></svg>',cls:'warn',cid:c.id,t:`اشتراك ${c.name} ينتهي ${left===0?'النهاردة':'خلال '+left+' يوم'}`});
   const rem=s.total-s.used;
   if(rem===1)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-package"/></svg>',cls:'warn',cid:c.id,t:`${c.name} فاضل له جلسة واحدة بس`});
   if(rem===0)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-slash"/></svg>',cls:'bad',cid:c.id,t:`${c.name} خلّص جلساته — محتاج تجديد`});
   if(balance(c.id)>0)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-banknote"/></svg>',cls:'bad',cid:c.id,t:`${c.name} عليه ${fM(balance(c.id))} متأخرات`});
  }
  const ld=lastDone(c.id);
  if(s&&ld&&dayDiff(ld.date,t)>10)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-ghost"/></svg>',cls:'warn',cid:c.id,t:`${c.name} مش باين من ${dayDiff(ld.date,t)} يوم`});
  const lm=lastMeas(c.id);
  if(s&&(!lm||dayDiff(lm.date,t)>30))A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-scale"/></svg>',cls:'info',cid:c.id,t:`وزن ${c.name} مش متسجّل من ${lm?dayDiff(lm.date,t)+' يوم':'البداية'}`});
  // Positive progress: weight moving toward goal direction
  const ms=db.meas.filter(m=>m.clientId===c.id&&m.weight).sort((a,b)=>a.date.localeCompare(b.date));
  if(ms.length>=3){const diff=ms.at(-1).weight-ms[0].weight;
   if(c.goal==='تخسيس'&&diff<=-2)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-flame"/></svg>',cls:'ok',cid:c.id,t:`${c.name} نزل ${Math.abs(diff).toFixed(1)} كجم — Progress ممتاز!`});
   if(c.goal==='زيادة عضل'&&diff>=2)A.push({icon:'<svg class="ic" aria-hidden="true"><use href="#i-dumbbell"/></svg>',cls:'ok',cid:c.id,t:`${c.name} زاد ${diff.toFixed(1)} كجم — شغل عالي!`});}
 });
 return A;
}

 if(a.length<6){err.textContent='الجديدة لازم 6 حروف على الأقل';return}
 if(a!==b){err.textContent='التأكيد مش مطابق';return}
 if(a===oldPw){err.textContent='الجديدة زي القديمة';return}
 err.textContent='بيتغيّر…';
 try{
  const r=await apiCall('changePassword',{newPassword:a});
  if(!r.ok){
   err.textContent=r.error==='too_short'?'قصيرة أوي'
     :r.error==='same_password'?'الجديدة زي القديمة'
     :r.error==='locked'?'محاولات كتير — استنى 15 دقيقة'
     :'الباسورد الحالي غلط';
   return;
  }
  // Only swap the local copy after the server confirms, so a failed change
  // can never leave this device holding a password the backend rejects.
  appPassword=a;localStorage.setItem(PW_KEY,a);
  closeModal();toast('✓ اتغيّرت كلمة المرور');
 }catch(e){err.textContent='مفيش اتصال بالسيرفر'}
}

/* ---------- Session ring SVG ---------- */
function ring(rem,total){
 const pct=total?Math.min(1,rem/total):0;const r=22,c=2*Math.PI*r;
 const col=rem===0?'var(--red)':rem<=2?'var(--orange)':'var(--lime)';
 return`<div class="ring"><svg width="52" height="52" viewBox="0 0 52 52">
  <circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--s3)" stroke-width="4.5"/>
  <circle cx="26" cy="26" r="${r}" fill="none" stroke="${col}" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}"/></svg>
  <div class="rt"><b class="num" style="color:${col}">${rem}</b><span>متبقي</span></div></div>`;
}

function bodyMapSvg(view,dataFn,selectedId,size){
 const shapes=BODY_SHAPES[view]||BODY_SHAPES.front;
 const body=BODY_OUTLINE.map(d=>`<path d="${d}" class="body-outline"/>`).join('');
 const groups=shapes.map(s=>{

  const cls=['mgroup',selectedId===s.m?'sel':'',st?st.cls:''].filter(Boolean).join(' ');
  const mus=muscleOf(s.m);
  return `<path d="${s.d}" class="${cls}" data-m="${s.m}" onclick="pickMuscle('${s.m}')"><title>${mus?mus.ar:s.m}</title></path>`;
 }).join('');
 const fibers=(FIBER_LINES[view]||[]).map(d=>`<path d="${d}" class="fiber-line"/>`).join('');
 return `<svg viewBox="0 0 240 480" class="body-map${size==='lg'?' lg':''}" xmlns="http://www.w3.org/2000/svg">${BODY_DEFS}${body}${groups}${fibers}</svg>`;
}

 const a=new Uint8Array(16);crypto.getRandomValues(a);
 return [...a].map(b=>b.toString(16).padStart(2,'0')).join('');

function renderPortal(token){
 $('#app').style.display='none';$('#bnav').style.display='none';$('#fab').style.display='none';
 $('#fit-chrome').innerHTML='';
 if(!portalData){
  $('#login-screen').innerHTML=`<div class="login-wrap"><div class="login-card">

     style="text-align:center;font-size:30px;letter-spacing:.4em" onkeydown="if(event.key==='Enter')portalLogin('${token}')">
   <div id="p-err" class="tiny" style="color:var(--red);min-height:18px;margin:8px 0"></div>
   <button class="btn btn-p btn-block" onclick="portalLogin('${token}')">دخول</button>
  </div></div>`;
  return;
 }
 const d=portalData, c=d.client;
 const rem=d.sub?Math.max(0,d.sub.total-d.sub.used):0;
 const meas=(d.meas||[]).filter(m=>m.weight);
 const w=meas[0]?meas[0].weight:null;

 /* The server sends only raw fields; the calorie maths runs here so the
    trainee sees exactly what the coach sees, from the same functions. */
 let nut=null, plan=null;
 if(w&&c.height&&c.age){
  const bmrRaw=mifflin(w,c.height,c.age,isMale(c));
  const tdeeRaw=bmrRaw*(c.activity||1.55);
  const gp=GOAL_PLAN[c.goal]||GOAL_PLAN['لياقة'];
  const target=Math.round(tdeeRaw*(1+gp.pct));
  let protein=Math.round(gp.protein*w);
  protein=Math.min(protein,Math.round(target*0.40/4));
  const fat=Math.round(0.8*w);
  const carbs=Math.max(0,Math.round((target-protein*4-fat*9)/4));
  nut={bmr:Math.round(bmrRaw),tdee:Math.round(tdeeRaw),target,protein,carbs,fat,note:gp.note};
  // The coach's food substitutions travel with the client record, so the
  // trainee sees the same plan the coach built — not the raw template.
  plan=mealPlan(target,portalCuisine,protein,fat,c.foodSwaps||{});
 }

 /* Weight trend: oldest → newest, drawn as a simple sparkline. */
 const trend=meas.slice().reverse();
 const spark=(()=>{
  if(trend.length<2)return '';
  const vs=trend.map(m=>m.weight), lo=Math.min(...vs), hi=Math.max(...vs), span=(hi-lo)||1;
  const W=280,H=64;
  const pts=vs.map((v,i)=>[8+i*(W-16)/(vs.length-1), H-8-((v-lo)/span)*(H-20)]);
  const dAttr=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=dAttr+` L${pts.at(-1)[0].toFixed(1)} ${H} L${pts[0][0].toFixed(1)} ${H} Z`;
  const first=vs[0], last=vs.at(-1), diff=+(last-first).toFixed(1);
  return `<div class="p-card">
    <div class="p-row"><b class="grow">تطور وزنك</b>
     <span class="p-delta ${diff<0?'down':diff>0?'up':''}">${diff>0?'+':''}${diff} كجم</span></div>
    <svg viewBox="0 0 ${W} ${H}" class="p-spark" preserveAspectRatio="none" aria-hidden="true">
     <path d="${area}" fill="rgba(255,122,26,.14)"/>
     <path d="${dAttr}" fill="none" stroke="#ff7a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
     ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="#ff7a1a"/>`).join('')}
    </svg>
    <div class="p-row tiny" dir="ltr"><span class="grow">${fD(trend[0].date)}</span><span>${fD(trend.at(-1).date)}</span></div>
   </div>`;
 })();

 const up=d.upcoming||[];
 const next=up[0];

 $('#login-screen').innerHTML=`<div class="portal">
  <div class="p-head">
   <div class="p-av">${esc(initials(c.name))}</div>
   <div class="grow">
    <h1>${esc(c.name)}</h1>
    <p>${[c.goal,c.level].filter(Boolean).map(esc).join(' · ')}</p>
   </div>
  </div>

  ${next?`<div class="p-next">
    <div class="p-next-l">جلستك الجاية</div>
    <div class="p-next-d">${fD(next.date)}${next.time?' · '+esc(next.time):''}</div>
    ${next.muscles&&next.muscles.length?`<div class="p-chips">${next.muscles.map(m=>`<span class="p-chip on">${esc(m)}</span>`).join('')}</div>`:''}
   </div>`:`<div class="p-card" style="text-align:center">
    <p class="p-muted">مفيش جلسة محجوزة دلوقتي — كلّم المدرب لحجز الميعاد الجاي.</p>
   </div>`}

  <div class="p-2">
   <div class="p-card p-stat"><b>${rem}</b><span>جلسة متبقية</span></div>
   <div class="p-card p-stat"><b>${w?w:'—'}<i>${w?' كجم':''}</i></b><span>آخر وزن</span></div>
  </div>

  ${up.length>1?`<h2 class="p-h2">مواعيدك الجاية</h2>
   <div class="p-list">${up.slice(1).map(s=>`<div class="p-li">
     <div class="grow"><b>${fD(s.date)}</b>${s.time?`<span class="p-muted"> · ${esc(s.time)}</span>`:''}</div>
     <span class="p-muted">${esc((s.muscles||[]).join(' · ')||'—')}</span>
    </div>`).join('')}</div>`:''}

  ${nut?`<div class="p-cal">
    <div class="p-cal-l">سعراتك اليومية</div>
    <div class="p-cal-v">${nut.target}</div>
    <div class="p-cal-s">حرقك اليومي ${nut.tdee} · ${esc(nut.note)}</div>
    <div class="p-macros">
     <div><b>${nut.protein}</b><span>بروتين</span></div>

    </div>
   </div>`:''}

  ${plan?`<h2 class="p-h2">وجباتك المقترحة

      `<button class="p-chip ${portalCuisine===k?'on':''}" onclick="portalSetCuisine('${k}')">${v.ar}</button>`).join('')}</span></h2>
   ${plan.meals.map(m=>`<div class="p-card p-meal">

  <p class="p-foot">Coach OS · بيانات للعرض فقط</p>
 </div>`;
}

const COARSE_MUSCLE_MAP={'صدر':['chest'],'ظهر':['lats','traps','lowerback'],'كتف':['shoulders'],'ذراع':['biceps','triceps','forearms'],'رجل':['quads','hamstrings','glutes','calves'],'بطن':['abs','obliques'],'كارديو':[],'Full Body':MUSCLE_ATLAS.map(m=>m.id)};
function muscleRecoveryStatus(clientId,muscleId){
 const sessions=db.sessions.filter(s=>s.clientId===clientId&&s.status==='done').sort((a,b)=>b.date.localeCompare(a.date));
 let lastDate=null;
 for(const s of sessions){
  const fromEx=(s.exercises||[]).some(e=>{const ex=e.exId&&exerciseOf(e.exId);return ex&&ex.primary.includes(muscleId)});
  const fromCoarse=(s.muscles||[]).some(m=>(COARSE_MUSCLE_MAP[m]||[]).includes(muscleId));
  if(fromEx||fromCoarse){lastDate=s.date;break}
 }
 if(!lastDate)return{cls:''};
 const hrsAgo=(Date.now()-D(lastDate).getTime())/36e5;
 const rec=muscleOf(muscleId).recovery;
 if(hrsAgo<=rec)return{cls:'ok'};
 if(hrsAgo<=rec*2.5)return{cls:'warn'};
 return{cls:'bad'};
}

function qHint(){

 const rem=remaining(cid),c=client(cid);
 $('#q-hint').innerHTML=rem===0?`<div class="pin-note" style="margin-bottom:12px"><svg class="ic" aria-hidden="true"><use href="#i-slash"/></svg> <b>${esc(c.name)} مفيش عنده رصيد!</b> التسجيل هيحتاج تأكيد خاص.</div>`
  :rem<=2?`<div class="pin-note" style="margin-bottom:12px"><svg class="ic" aria-hidden="true"><use href="#i-alert-triangle"/></svg> فاضل <b>${rem}</b> جلسة بس — ذكّره بالتجديد.</div>`:'';
 if(c?.pinned)$('#q-hint').innerHTML+=`<div class="pin-note" style="margin-bottom:12px"><svg class="ic" aria-hidden="true"><use href="#i-map-pin"/></svg> ${esc(c.pinned)}</div>`;
}

 const cid=$('#q-c').value,kind=$('#q-kind').value,sub=activeSub(cid);
 if(kind==='paid'){
  if(!sub){if(!confirm('المتدرب مفيش عنده اشتراك نشط. تسجّل الجلسة بدون خصم؟'))return}
  else if(sub.total-sub.used<=0){if(!confirm('<svg class="ic" aria-hidden="true"><use href="#i-alert-triangle"/></svg> الرصيد صفر! تأكيد التسجيل والخصم بالسالب؟'))return;sub.used++;log('خصم بدون رصيد (تأكيد خاص)',client(cid).name)}

 }
 db.sessions.push({id:uid(),clientId:cid,date:todayS(),time:nowT(),dur:+$('#q-dur').value||60,muscles:[...qMuscles],
  rpe:+$('#q-rpe').value||null,attended:1,deduct:kind==='paid'&&sub?1:0,kind,status:'done',notes:$('#q-notes').value.trim(),exercises:[]});
 closeModal();save('<svg class="ic" aria-hidden="true"><use href="#i-zap"/></svg> اتسجلت! المتبقي: '+remaining(cid));

function saveFull(editId){
 const muscles=[...document.querySelectorAll('#modal [data-m].on')].map(b=>b.dataset.m);
 const exercises=exRows.filter(e=>e.name.trim());
 if(editId){
  const s=db.sessions.find(x=>x.id===editId);
  Object.assign(s,{date:$('#fs-date').value,time:$('#fs-time').value,dur:+$('#fs-dur').value||60,muscles,rpe:+$('#fs-rpe').value||null,kind:$('#fs-kind').value,notes:$('#fs-notes').value.trim(),exercises});
  if(exercises.some(e=>+e.pr))log('PR جديد <svg class="ic" aria-hidden="true"><use href="#i-award"/></svg>',client(s.clientId).name);
  closeModal();save('✓ اتحدثت');return;
 }
 const cid=$('#fs-c').value,date=$('#fs-date').value,time=$('#fs-time').value;
 // Conflict check: same date+time already scheduled
 if(db.sessions.some(x=>x.date===date&&x.time===time&&x.status==='scheduled')&&!confirm('<svg class="ic" aria-hidden="true"><use href="#i-alert-triangle"/></svg> في جلسة تانية متجدولة في نفس الميعاد! متأكد؟'))return;
 db.sessions.push({id:uid(),clientId:cid,date,time,dur:+$('#fs-dur').value||60,muscles,rpe:+$('#fs-rpe').value||null,
  attended:0,deduct:0,kind:$('#fs-kind').value,status:date<=todayS()&&confirm('الجلسة تمّت بالفعل؟ (إلغاء = مجدولة)')?'done':'scheduled',notes:$('#fs-notes').value.trim(),exercises});
 const ns=db.sessions.at(-1);
 if(ns.status==='done'&&ns.kind==='paid'){const sub=activeSub(cid);if(sub){sub.used++;ns.deduct=1;log('خصم جلسة',client(cid).name)}}
 log('جدولة جلسة',client(cid).name+' — '+date+' '+time);
 closeModal();save('✓ اتسجلت');
}

let calBase=todayS();
function vCalendar(){
 const base=D(calBase);const start=new Date(base);start.setDate(base.getDate()-base.getDay());// week starts Sunday
 const days=[...Array(7)].map((_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d.toISOString().slice(0,10)});
 const t=todayS();
 $('#main').innerHTML=header('التقويم',null,`<button class="icon-btn" onclick="formSession()" aria-label="جدولة"><svg class="ic" aria-hidden="true"><use href="#i-plus"/></svg></button>`)+`
 <div class="cal-head">
  <button class="icon-btn" onclick="calShift(7)">‹</button>
  <h3>${fD(days[0])} — ${fD(days[6])}</h3>
  <button class="icon-btn" onclick="calShift(-7)">›</button>
  <button class="btn btn-s btn-sm" onclick="calBase=todayS();vCalendar()">اليوم</button></div>
 <div class="cal-week">
 ${days.map(d=>{
  const ss=db.sessions.filter(s=>s.date===d&&s.status!=='cancelled').sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  return`<div class="cal-day ${d===t?'today':''}" onclick="calDay('${d}')">
   <div class="dn">${AR_D[D(d).getDay()].slice(0,5)}<br><span class="num" style="font-size:11px;color:var(--tx2)">${D(d).getDate()}</span></div>
   ${ss.slice(0,2).map(s=>`<div class="pill num">${s.time||''} ${esc((client(s.clientId)?.name||'').split(' ')[0])}</div>`).join('')}
   ${ss.length>2?`<div class="cnt">+${ss.length-2} كمان</div>`:''}</div>`}).join('')}
 </div>
 <div id="cal-detail" class="mt"></div>`;
 calDay(days.includes(t)?t:days[0]);
}
function calShift(n){calBase=new Date(D(calBase).getTime()-n*864e5).toISOString().slice(0,10);vCalendar()}
function calDay(d){
 const ss=db.sessions.filter(s=>s.date===d).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
 $('#cal-detail').innerHTML=`<div class="sec-h"><h2>${fDT(d)}</h2>
  <button class="more" style="background:none" onclick="formSessionAt('${d}')"><svg class="ic" aria-hidden="true"><use href="#i-plus"/></svg> جدولة هنا</button></div>
 <div class="list">${ss.map(s=>sessionCard(s,true)).join('')||'<div class="empty" style="padding:22px"><p>مفيش جلسات في اليوم ده</p></div>'}</div>`;
}

function csv(kind){
 let rows,head,name=kind;
 if(kind==='clients'){head=['Name','Phone','Age','Goal','Level','Status','Remaining','SubEnd','LastWeight'];
  rows=db.clients.filter(c=>!c.archived).map(c=>[c.name,c.phone,c.age,c.goal,c.level,statusOf(c).t,remaining(c.id),activeSub(c.id)?.end||'',lastMeas(c.id)?.weight||''])}
 else if(kind==='sessions'){head=['Client','Date','Time','Status','Kind','Muscles','RPE','Duration','Notes'];
  rows=db.sessions.map(s=>[client(s.clientId)?.name,s.date,s.time,s.status,s.kind,s.muscles.join('|'),s.rpe,s.dur,s.notes])}
 else if(kind==='payments'){head=['Client','Amount','Date','Method','Notes'];
  rows=db.payments.map(p=>[client(p.clientId)?.name,p.amount,p.date,p.method,p.notes])}
 else{head=['Client','Date','Weight','Fat','Waist','Chest','Arms','Hips','Thighs'];
  rows=db.meas.map(m=>[client(m.clientId)?.name,m.date,m.weight,m.fat,m.waist,m.chest,m.arms,m.hips,m.thighs])}
 const c='\ufeff'+[head,...rows].map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(',')).join('\n');
 dl(new Blob([c],{type:'text/csv'}),`coachos-${name}-${todayS()}.csv`);toast('✓ اتصدّر');
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3e3)}

/* ---------- Cloud sync engine (side-car on save()/boot; view/CRUD code untouched) ---------- */
async function apiCall(action,extra,pwOverride){
 // The portal runs on a trainee's phone. Never put the coach password in that
 // request — the token and 4-digit code are its only credentials.
 const payload=action==='portal'
  ? Object.assign({action},extra||{})
  : Object.assign({action,password:pwOverride||appPassword},extra||{});
 const res=await fetch(SHEET_API_URL,{method:'POST',body:JSON.stringify(payload)});
 return res.json();
}
function snapshotDb(){
 const s={};
 ENTITIES.forEach(e=>{
  if(e==='settings'){s.settings=new Map([['settings',JSON.stringify(db.settings)]]);return}
  s[e]=new Map((db[e]||[]).map(r=>[r.id,JSON.stringify(r)]));
 });
 return s;
}
function enqueue(entity,id,op,payload){
 outbox=outbox.filter(o=>!(o.entity===entity&&o.id===id));
 outbox.push({entity,id,op,payload,ts:new Date().toISOString()});
 localStorage.setItem(OUTBOX_KEY,JSON.stringify(outbox));
}
function diffAndEnqueue(){
 if(!SYNC_ENABLED)return;
 const next=snapshotDb();
 if(!dbSnapshot){dbSnapshot=next;return}
 ENTITIES.forEach(e=>{
  const before=dbSnapshot[e]||new Map(), after=next[e]||new Map();
  after.forEach((json,id)=>{if(before.get(id)!==json)enqueue(e,id,'upsert',e==='settings'?db.settings:JSON.parse(json))});
  before.forEach((json,id)=>{if(!after.has(id))enqueue(e,id,'delete',null)});
 });
 dbSnapshot=next;
}
async function flushQueue(){
 if(!SYNC_ENABLED||syncing||!navigator.onLine||!appPassword||outbox.length===0)return;
 syncing=true;
 const batch=outbox.slice(0,200);
 try{
  const r=await apiCall('push',{ops:batch.map(o=>({entity:o.entity,id:o.id,op:o.op,payload:o.payload}))});
  if(r&&r.ok){
   outbox=outbox.filter(o=>batch.indexOf(o)===-1);
   localStorage.setItem(OUTBOX_KEY,JSON.stringify(outbox));
  }
 }catch(e){/* stays queued, retried later */}
 syncing=false;
 if(outbox.length>0)setTimeout(flushQueue,3000);
}
async function pullChanges(){
 if(!SYNC_ENABLED||!navigator.onLine||!appPassword)return;
 const cursors=JSON.parse(localStorage.getItem(CURSOR_KEY)||'{}');
 let mutated=false,r;
 try{r=await apiCall('pull',{cursors})}catch(e){return}
 if(!r||!r.ok)return;
 ENTITIES.forEach(e=>{
  const rows=(r.entities&&r.entities[e])||[];
  if(!rows.length)return;
  if(e==='settings'){
   const row=rows[rows.length-1];
   if(!row.deleted_at){db.settings=Object.assign({},db.settings,row.data,{_updatedAt:row.updated_at});mutated=true}
   cursors[e]=row.updated_at;return;
  }
  const arr=db[e]=db[e]||[];
  rows.forEach(row=>{
   const i=arr.findIndex(x=>x.id===row.id);
   if(row.deleted_at){if(i>-1){arr.splice(i,1);mutated=true}return}
   const local=i>-1?arr[i]:null;
   if(!local||!local._updatedAt||row.updated_at>local._updatedAt){
    const merged=Object.assign({},row.data,{id:row.id,_updatedAt:row.updated_at});
    if(i>-1)arr[i]=merged;else arr.push(merged);
    mutated=true;
   }
  });
  cursors[e]=rows[rows.length-1].updated_at;
 });
 localStorage.setItem(CURSOR_KEY,JSON.stringify(cursors));
 localStorage.setItem(LAST_SYNC_KEY,new Date().toISOString());
 if(mutated){persist();dbSnapshot=snapshotDb();route()}
}
async function afterFirstLogin(){
 if(!SYNC_ENABLED||localStorage.getItem(BACKFILL_KEY)||!navigator.onLine)return;
 if(db.settings.setup){
  ENTITIES.forEach(e=>{
   if(e==='settings'){enqueue('settings','settings','upsert',db.settings);return}
   (db[e]||[]).forEach(row=>enqueue(e,row.id,'upsert',row));
  });
  let tries=0;
  while(outbox.length>0&&tries<20){await flushQueue();tries++}
 }
 await pullChanges();
 if(outbox.length===0)localStorage.setItem(BACKFILL_KEY,'1');
 dbSnapshot=snapshotDb();
}

/* Which program day comes next for this client: the day after whichever one
   was trained most recently, so the split actually rotates. */
function nextProgramDay(cid){
 const c=client(cid); if(!c||!c.programId)return null;
 const p=programOf(c.programId); if(!p||!p.days.length)return null;
 const done=db.sessions.filter(s=>s.clientId===cid&&s.status==='done')
   .sort((a,b)=>b.date.localeCompare(a.date));
 for(const s of done){
  const idx=p.days.findIndex(d=>d.muscles.length&&
    d.muscles.every(m=>(s.muscles||[]).includes(m))&&
    (s.muscles||[]).every(m=>d.muscles.includes(m)));
  if(idx>=0)return{program:p,day:p.days[(idx+1)%p.days.length],index:(idx+1)%p.days.length};
 }
 return{program:p,day:p.days[0],index:0};
}

/* Body metrics mirror the Stats reference. BMR/maintenance are derived,
   not hardcoded, so editing the metrics keeps the numbers honest. */
const STATS_MOCK={weight:58,height:186,age:33,gender:'Male',burnedToday:11,workoutKcal:0,activity:1.55};
/* Keep BMR unrounded internally: rounding before the activity multiply
   drifts maintenance by a kcal (1583*1.55 = 2454, but 1582.5*1.55 = 2453). */
const fitBmrRaw=m=>10*m.weight+6.25*m.height-5*m.age+(m.gender==='Male'?5:-161);
const fitBmr=m=>Math.round(fitBmrRaw(m));
